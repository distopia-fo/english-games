<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Anagrams — собираем слова из букв</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
            margin-bottom: 8px;
        }
        
        .sub {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.9);
        }
        
        .game-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: #f3f4f6;
            padding: 12px 24px;
            border-radius: 60px;
        }
        
        .counter {
            font-weight: 600;
            color: #374151;
            font-size: 1.1rem;
        }
        
        .score {
            background: #667eea;
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 600;
        }
        
        /* Двухколоночный макет */
        .game-layout {
            display: flex;
            gap: 24px;
            margin-bottom: 24px;
        }
        
        .left-column {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f3f4f6;
            border-radius: 32px;
            padding: 20px;
        }
        
        .card-image {
            width: 100%;
            max-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .card-image img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 24px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .image-placeholder {
            width: 100%;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            background: linear-gradient(135deg, #e5e7eb, #d1d5db);
            color: #6b7280;
            border-radius: 24px;
        }
        
        .right-column {
            flex: 1;
        }
        
        .card-content {
            background: white;
            border-radius: 32px;
            padding: 24px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        /* Слово - ячейки для букв */
        .word-container {
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 20px;
            border: 2px solid #e5e7eb;
        }
        
        .word-letters {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .word-group {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
        }
        
        .letter-slot {
            width: 55px;
            height: 55px;
            background: white;
            border: 3px solid #667eea;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #667eea;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-transform: lowercase;
        }
        
        .letter-slot.filled {
            background: #e0e7ff;
            border-color: #667eea;
            color: #4c51bf;
        }
        
        .letter-slot.empty {
            background: #f3f4f6;
            border-style: dashed;
            color: #9ca3af;
        }
        
        /* Буквы для перетаскивания */
        .letters-container {
            background: #f3f4f6;
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .letters-title {
            font-weight: 600;
            color: #374151;
            margin-bottom: 16px;
            text-align: center;
            font-size: 1.1rem;
        }
        
        .letters-grid {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .letter-card {
            width: 65px;
            height: 65px;
            background: white;
            border: 3px solid #667eea;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: #667eea;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-transform: lowercase;
        }
        
        .letter-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.3);
            background: #e0e7ff;
        }
        
        .letter-card.used {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: scale(0.8);
        }
        
        /* Кнопки */
        .navigation {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .nav-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            background: white;
            border: 2px solid #e5e7eb;
            color: #374151;
            transition: all 0.2s;
        }
        
        .nav-btn:hover:not(:disabled) {
            background: #f3f4f6;
            border-color: #667eea;
        }
        
        .nav-btn.primary {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
        
        .nav-btn.primary:hover:not(:disabled) {
            background: #5a67d8;
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Подсказка */
        .hint-area {
            background: #fef3c7;
            border-radius: 16px;
            padding: 12px;
            margin-top: 20px;
            text-align: center;
            color: #92400e;
            font-size: 0.9rem;
            border: 1px solid #f59e0b;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .hint-area:hover {
            background: #fde68a;
        }
        
        .hint-text {
            display: none;
            margin-top: 8px;
            font-size: 0.9rem;
            color: #92400e;
        }
        
        .hint-text.show {
            display: block;
        }
        
        .feedback {
            text-align: center;
            padding: 16px;
            border-radius: 16px;
            font-weight: 500;
            margin: 16px 0;
            display: none;
        }
        
        .feedback.show {
            display: block;
        }
        
        .feedback.correct {
            background: #d1fae5;
            color: #065f46;
            border: 2px solid #10b981;
        }
        
        .feedback.warning {
            background: #fee2e2;
            color: #991b1b;
            border: 2px solid #ef4444;
        }
        
        .feedback.info {
            background: #dbeafe;
            color: #1e40af;
            border: 2px solid #3b82f6;
        }
        
        /* Финальное поздравление */
        .results-area {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .results-area.show {
            display: block;
        }
        
        .congrats {
            font-size: 3rem;
            font-weight: 800;
            color: #667eea;
            margin-bottom: 16px;
        }
        
        .restart-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 18px 36px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            display: block;
        }
        
        .restart-btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .game-layout {
                flex-direction: column;
            }
            
            .letter-slot {
                width: 45px;
                height: 45px;
                font-size: 1.3rem;
            }
            
            .letter-card {
                width: 55px;
                height: 55px;
                font-size: 1.8rem;
            }
            
            .word-group {
                flex-wrap: wrap;
            }
            
            .word-letters {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 HOUSE ANAGRAMS</h1>
            <div class="sub">Собери слово из букв</div>
        </header>
        
        <div class="game-box">
            <div id="game-area">
                <div class="progress-header">
                    <span class="counter" id="card-counter">1 / 29</span>
                    <span class="score" id="score-display">✅ 0 / 29</span>
                </div>
                
                <div class="game-layout">
                    <div class="left-column">
                        <div class="card-image" id="card-image">
                            <div class="image-placeholder" id="image-placeholder">🖼️</div>
                        </div>
                    </div>
                    <div class="right-column">
                        <div class="card-content">
                            <div class="word-container">
                                <div class="word-letters" id="word-letters"></div>
                            </div>
                            
                            <div class="letters-container">
                                <div class="letters-title">📌 Перемешанные буквы:</div>
                                <div class="letters-grid" id="letters-grid"></div>
                            </div>
                            
                            <div class="hint-area" id="hint-area">
                                💡 Нужна подсказка? Нажми сюда
                                <div class="hint-text" id="hint-text"></div>
                            </div>
                            
                            <div class="feedback" id="feedback"></div>
                        </div>
                    </div>
                </div>
                
                <div class="navigation">
                    <button class="nav-btn" id="prev-btn" disabled>◀ Назад</button>
                    <button class="nav-btn primary" id="next-btn">Вперёд ▶</button>
                </div>
            </div>
            
            <div id="results-area" class="results-area">
                <div class="congrats">🎉 Good job! 🎉</div>
                <button id="restart-btn" class="restart-btn">🔄 Пройти заново</button>
            </div>
        </div>
    </div>

    <script>
        // СПИСОК СЛОВ ДЛЯ ИГРЫ (добавлены новые)
        const WORDS = [
            { word: "bathroom", hint: "Комната для купания 🛁", image: "bathroom", displayParts: ["bathroom"] },
            { word: "bedroom", hint: "Комната для сна 🛏️", image: "bedroom", displayParts: ["bedroom"] },
            { word: "door", hint: "То, через что входят в комнату 🚪", image: "door", displayParts: ["door"] },
            { word: "floor", hint: "То, по чему ходят 🪵", image: "floor", displayParts: ["floor"] },
            { word: "garage", hint: "Место для машины 🚗", image: "garage", displayParts: ["garage"] },
            { word: "garden", hint: "Место с цветами и деревьями 🌻", image: "garden", displayParts: ["garden"] },
            { word: "kitchen", hint: "Место для приготовления еды 🍳", image: "kitchen", displayParts: ["kitchen"] },
            { word: "living room", hint: "Комната для отдыха и гостей 🛋️", image: "livingroom", displayParts: ["living", "room"] },
            { word: "wall", hint: "Вертикальная поверхность в комнате 🧱", image: "wall", displayParts: ["wall"] },
            { word: "window", hint: "Сквозь него смотрят на улицу 🪟", image: "window", displayParts: ["window"] },
            { word: "armchair", hint: "Мягкое кресло с подлокотниками 🪑", image: "armchair", displayParts: ["armchair"] },
            { word: "bath", hint: "В нём купаются 🛁", image: "bath", displayParts: ["bath"] },
            { word: "bed", hint: "На нём спят 🛏️", image: "bed", displayParts: ["bed"] },
            { word: "chair", hint: "На нём сидят 🪑", image: "chair", displayParts: ["chair"] },
            { word: "desk", hint: "Письменный стол 📚", image: "desk", displayParts: ["desk"] },
            { word: "fridge", hint: "Хранит продукты холодными 🧊", image: "fridge", displayParts: ["fridge"] },
            { word: "sofa", hint: "Мягкая мебель для сидения 🛋️", image: "sofa", displayParts: ["sofa"] },
            { word: "table", hint: "За ним едят 🍽️", image: "table", displayParts: ["table"] },
            { word: "wardrobe", hint: "Шкаф для одежды 👔", image: "wardrobe", displayParts: ["wardrobe"] },
            { word: "carpet", hint: "Мягкое покрытие на полу 🔲", image: "carpet", displayParts: ["carpet"] },
            { word: "cushion", hint: "Мягкая подушка для сидения 🪶", image: "cushion", displayParts: ["cushion"] },
            { word: "lamp", hint: "Даёт свет 💡", image: "lamp", displayParts: ["lamp"] },
            { word: "plant", hint: "Зелёное украшение дома 🪴", image: "plant", displayParts: ["plant"] },
            { word: "poster", hint: "Картина на стене 🖼️", image: "poster", displayParts: ["poster"] },
            { word: "television", hint: "Чёрный ящик с экраном 📺", image: "television", displayParts: ["television"] },
            { word: "games console", hint: "Игровая приставка 🎮", image: "gamesconsole", displayParts: ["games", "console"] },
            { word: "laptop", hint: "Портативный компьютер 💻", image: "laptop", displayParts: ["laptop"] },
            { word: "computer", hint: "Настольный компьютер 🖥️", image: "computer", displayParts: ["computer"] }
        ];

        // Состояние игры
        let currentIndex = 0;
        let userAnswers = new Array(WORDS.length).fill(null);
        let wordSlotsState = WORDS.map(() => []);
        let remainingLetters = WORDS.map(() => ({}));
        let currentShuffledLetters = [];

        // DOM элементы
        const gameArea = document.getElementById('game-area');
        const resultsArea = document.getElementById('results-area');
        const cardImage = document.getElementById('card-image');
        const wordLettersDiv = document.getElementById('word-letters');
        const lettersGrid = document.getElementById('letters-grid');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');
        const restartBtn = document.getElementById('restart-btn');
        const cardCounter = document.getElementById('card-counter');
        const scoreDisplay = document.getElementById('score-display');
        const feedback = document.getElementById('feedback');
        const hintArea = document.getElementById('hint-area');
        const hintText = document.getElementById('hint-text');

        // Инициализация оставшихся букв и состояния ячеек для текущего слова
        function initWordState(index) {
            const wordObj = WORDS[index];
            const wordNoSpaces = wordObj.word.replace(/\s/g, '');
            const saved = userAnswers[index];
            if (saved !== null) {
                const savedLetters = saved.split('');
                wordSlotsState[index] = savedLetters;
                const allLetters = wordNoSpaces.split('');
                const remaining = [...allLetters];
                for (let l of savedLetters) {
                    const idx = remaining.indexOf(l);
                    if (idx !== -1) remaining.splice(idx, 1);
                }
                const remMap = {};
                for (let l of remaining) remMap[l] = (remMap[l] || 0) + 1;
                remainingLetters[index] = remMap;
            } else {
                wordSlotsState[index] = new Array(wordNoSpaces.length).fill('');
                const allLetters = wordNoSpaces.split('');
                const remMap = {};
                for (let l of allLetters) remMap[l] = (remMap[l] || 0) + 1;
                remainingLetters[index] = remMap;
            }
        }

        function generateShuffledLetters() {
            const rem = remainingLetters[currentIndex];
            const lettersArray = [];
            for (let [letter, count] of Object.entries(rem)) {
                for (let i = 0; i < count; i++) lettersArray.push(letter);
            }
            for (let i = lettersArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [lettersArray[i], lettersArray[j]] = [lettersArray[j], lettersArray[i]];
            }
            currentShuffledLetters = lettersArray;
        }

        // Отрисовка ячеек для букв
        function renderCurrentWord() {
            const wordObj = WORDS[currentIndex];
            const slots = wordSlotsState[currentIndex];
            wordLettersDiv.innerHTML = '';
            
            if (wordObj.displayParts.length > 1) {
                let globalSlotIndex = 0;
                for (let part of wordObj.displayParts) {
                    const group = document.createElement('div');
                    group.className = 'word-group';
                    for (let i = 0; i < part.length; i++) {
                        const letter = slots[globalSlotIndex] || '';
                        const slotDiv = document.createElement('div');
                        slotDiv.className = `letter-slot ${letter ? 'filled' : 'empty'}`;
                        slotDiv.textContent = letter || '?';
                        slotDiv.dataset.slotIndex = globalSlotIndex;
                        slotDiv.addEventListener('click', () => {
                            if (letter) {
                                slots[globalSlotIndex] = '';
                                remainingLetters[currentIndex][letter] = (remainingLetters[currentIndex][letter] || 0) + 1;
                                generateShuffledLetters();
                                renderCurrentWord();
                                renderAvailableLetters();
                                feedback.textContent = `✓ Буква "${letter}" удалена`;
                                feedback.className = 'feedback show correct';
                                setTimeout(() => feedback.classList.remove('show'), 1000);
                            }
                        });
                        group.appendChild(slotDiv);
                        globalSlotIndex++;
                    }
                    wordLettersDiv.appendChild(group);
                }
            } else {
                for (let i = 0; i < slots.length; i++) {
                    const letter = slots[i];
                    const slotDiv = document.createElement('div');
                    slotDiv.className = `letter-slot ${letter ? 'filled' : 'empty'}`;
                    slotDiv.textContent = letter || '?';
                    slotDiv.dataset.slotIndex = i;
                    slotDiv.addEventListener('click', () => {
                        if (letter) {
                            slots[i] = '';
                            remainingLetters[currentIndex][letter] = (remainingLetters[currentIndex][letter] || 0) + 1;
                            generateShuffledLetters();
                            renderCurrentWord();
                            renderAvailableLetters();
                            feedback.textContent = `✓ Буква "${letter}" удалена`;
                            feedback.className = 'feedback show correct';
                            setTimeout(() => feedback.classList.remove('show'), 1000);
                        }
                    });
                    wordLettersDiv.appendChild(slotDiv);
                }
            }
        }

        function renderAvailableLetters() {
            const totalRemaining = Object.values(remainingLetters[currentIndex]).reduce((a,b) => a+b, 0);
            if (!currentShuffledLetters.length || currentShuffledLetters.length !== totalRemaining) {
                generateShuffledLetters();
            }
            lettersGrid.innerHTML = '';
            for (let letter of currentShuffledLetters) {
                const letterCard = document.createElement('div');
                letterCard.className = 'letter-card';
                letterCard.textContent = letter.toLowerCase();
                letterCard.addEventListener('click', () => {
                    const slots = wordSlotsState[currentIndex];
                    const emptyIndex = slots.findIndex(l => l === '');
                    if (emptyIndex !== -1) {
                        const rem = remainingLetters[currentIndex];
                        rem[letter]--;
                        if (rem[letter] === 0) delete rem[letter];
                        slots[emptyIndex] = letter;
                        generateShuffledLetters();
                        renderCurrentWord();
                        renderAvailableLetters();
                        const allFilled = slots.every(l => l !== '');
                        if (allFilled) {
                            checkWordAndProceed(false);
                        }
                    } else {
                        feedback.textContent = '⚠️ Нет свободных ячеек! Нажми на ячейку, чтобы удалить букву';
                        feedback.className = 'feedback show warning';
                        setTimeout(() => feedback.classList.remove('show'), 1500);
                    }
                });
                lettersGrid.appendChild(letterCard);
            }
        }

        function checkWordAndProceed(doProceed = true) {
            const wordObj = WORDS[currentIndex];
            const wordNoSpaces = wordObj.word.replace(/\s/g, '');
            const currentWord = wordSlotsState[currentIndex].join('');
            const isCorrect = currentWord === wordNoSpaces;
            
            if (isCorrect) {
                userAnswers[currentIndex] = currentWord;
                feedback.textContent = '✅ Правильно!';
                feedback.className = 'feedback show correct';
                setTimeout(() => feedback.classList.remove('show'), 1000);
                updateScore();
                if (doProceed) {
                    if (currentIndex < WORDS.length - 1) {
                        setTimeout(() => {
                            currentIndex++;
                            loadWord();
                        }, 800);
                    } else {
                        finishGame();
                    }
                }
            } else {
                feedback.textContent = '❌ Слово введено неверно! Исправьте его и продолжите';
                feedback.className = 'feedback show warning';
                setTimeout(() => feedback.classList.remove('show'), 2000);
            }
        }

        function displayImage() {
            const word = WORDS[currentIndex];
            const img = new Image();
            img.src = `images/house/${word.image}.jpg`;
            img.alt = word.word;
            img.style.maxWidth = '100%';
            img.style.maxHeight = '400px';
            img.style.borderRadius = '24px';
            img.onload = () => {
                cardImage.innerHTML = '';
                cardImage.appendChild(img);
            };
            img.onerror = () => {
                img.src = `images/house/${word.image}.png`;
                img.onerror = () => {
                    cardImage.innerHTML = `<div class="image-placeholder">${word.word.split(' ').map(w => w[0].toUpperCase()).join('')}</div>`;
                };
            };
        }

        function updateHintDisplay() {
            hintText.innerHTML = WORDS[currentIndex].hint;
            hintText.classList.remove('show');
        }

        hintArea.addEventListener('click', () => {
            hintText.classList.toggle('show');
        });

        function updateScore() {
            const completedCount = userAnswers.filter(a => a !== null).length;
            scoreDisplay.textContent = `✅ ${completedCount} / ${WORDS.length}`;
        }

        function updateButtons() {
            prevBtn.disabled = currentIndex === 0;
        }

        function finishGame() {
            gameArea.style.display = 'none';
            resultsArea.classList.add('show');
        }

        function loadWord() {
            if (wordSlotsState[currentIndex].length === 0) {
                initWordState(currentIndex);
            }
            generateShuffledLetters();
            displayImage();
            renderCurrentWord();
            renderAvailableLetters();
            updateHintDisplay();
            updateButtons();
            updateScore();
            cardCounter.textContent = `${currentIndex + 1} / ${WORDS.length}`;
            feedback.classList.remove('show');
        }

        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                loadWord();
            }
        });

        nextBtn.addEventListener('click', () => {
            const slots = wordSlotsState[currentIndex];
            const allFilled = slots.every(l => l !== '');
            if (!allFilled) {
                feedback.textContent = '⚠️ Заполните все ячейки буквами!';
                feedback.className = 'feedback show warning';
                setTimeout(() => feedback.classList.remove('show'), 1500);
                return;
            }
            checkWordAndProceed(true);
        });

        restartBtn.addEventListener('click', () => {
            currentIndex = 0;
            userAnswers = new Array(WORDS.length).fill(null);
            wordSlotsState = WORDS.map(() => []);
            remainingLetters = WORDS.map(() => ({}));
            currentShuffledLetters = [];
            gameArea.style.display = 'block';
            resultsArea.classList.remove('show');
            loadWord();
        });

        function init() {
            loadWord();
        }

        init();
    </script>
</body>
</html>
