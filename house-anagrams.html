<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Anagrams — собираем слова из букв</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 24px;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
            margin-bottom: 8px;
        }
        
        .sub {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.9);
        }
        
        .game-box {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            background: #f3f4f6;
            padding: 12px 24px;
            border-radius: 60px;
        }
        
        .counter {
            font-weight: 600;
            color: #374151;
            font-size: 1.1rem;
        }
        
        .score {
            background: #667eea;
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            font-weight: 600;
        }
        
        /* Основная карточка */
        .flash-card {
            background: white;
            border: 3px solid #e5e7eb;
            border-radius: 32px;
            overflow: hidden;
            margin-bottom: 24px;
        }
        
        .card-image {
            width: 100%;
            min-height: 250px;
            max-height: 300px;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #e5e7eb;
        }
        
        .card-image img {
            width: 100%;
            height: auto;
            max-height: 280px;
            object-fit: contain;
            display: block;
        }
        
        .image-placeholder {
            width: 100%;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            background: linear-gradient(135deg, #e5e7eb, #d1d5db);
            color: #6b7280;
        }
        
        .card-content {
            padding: 30px;
        }
        
        /* Слово - ячейки для букв */
        .word-container {
            text-align: center;
            margin-bottom: 30px;
            padding: 15px;
            background: #f9fafb;
            border-radius: 20px;
            border: 2px solid #e5e7eb;
        }
        
        .word-letters {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .letter-slot {
            width: 55px;
            height: 55px;
            background: white;
            border: 3px solid #667eea;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #667eea;
            transition: all 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-transform: lowercase;
        }
        
        .letter-slot.filled {
            background: #e0e7ff;
            border-color: #667eea;
            color: #4c51bf;
        }
        
        .letter-slot.empty {
            background: #f3f4f6;
            border-style: dashed;
            color: #9ca3af;
        }
        
        /* Буквы для перетаскивания */
        .letters-container {
            background: #f3f4f6;
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .letters-title {
            font-weight: 600;
            color: #374151;
            margin-bottom: 16px;
            text-align: center;
            font-size: 1.1rem;
        }
        
        .letters-grid {
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        
        .letter-card {
            width: 65px;
            height: 65px;
            background: white;
            border: 3px solid #667eea;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            color: #667eea;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-transform: lowercase;
        }
        
        .letter-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(102, 126, 234, 0.3);
            background: #e0e7ff;
        }
        
        .letter-card.used {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transform: scale(0.8);
        }
        
        /* Кнопки */
        .check-btn {
            width: 100%;
            padding: 16px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
        }
        
        .check-btn:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        
        .check-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        
        .navigation {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .nav-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            background: white;
            border: 2px solid #e5e7eb;
            color: #374151;
            transition: all 0.2s;
        }
        
        .nav-btn:hover:not(:disabled) {
            background: #f3f4f6;
            border-color: #667eea;
        }
        
        .nav-btn.primary {
            background: #667eea;
            border-color: #667eea;
            color: white;
        }
        
        .nav-btn.primary:hover:not(:disabled) {
            background: #5a67d8;
        }
        
        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Подсказка */
        .hint-area {
            background: #fef3c7;
            border-radius: 16px;
            padding: 12px;
            margin-top: 20px;
            text-align: center;
            color: #92400e;
            font-size: 0.9rem;
            border: 1px solid #f59e0b;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .hint-area:hover {
            background: #fde68a;
        }
        
        .feedback {
            text-align: center;
            padding: 16px;
            border-radius: 16px;
            font-weight: 500;
            margin: 16px 0;
            display: none;
        }
        
        .feedback.show {
            display: block;
        }
        
        .feedback.correct {
            background: #d1fae5;
            color: #065f46;
            border: 2px solid #10b981;
        }
        
        .feedback.warning {
            background: #fee2e2;
            color: #991b1b;
            border: 2px solid #ef4444;
        }
        
        /* Результаты */
        .results-area {
            display: none;
        }
        
        .results-area.show {
            display: block;
        }
        
        .final-score {
            text-align: center;
            font-size: 3rem;
            font-weight: 800;
            margin: 24px 0;
            color: #667eea;
        }
        
        .results-table {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin: 24px 0;
            max-height: 450px;
            overflow-y: auto;
        }
        
        .restart-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 18px 36px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin: 0 auto;
            display: block;
        }
        
        .restart-btn:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .next-hint {
            margin-top: 12px;
            font-size: 0.85rem;
            color: #6b7280;
        }
        
        @media (max-width: 500px) {
            .letter-slot {
                width: 45px;
                height: 45px;
                font-size: 1.3rem;
            }
            
            .letter-card {
                width: 55px;
                height: 55px;
                font-size: 1.8rem;
            }
            
            .card-image {
                min-height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 HOUSE ANAGRAMS</h1>
            <div class="sub">Собери слово из букв</div>
        </header>
        
        <div class="game-box">
            <div id="game-area">
                <div class="progress-header">
                    <span class="counter" id="card-counter">1 / 26</span>
                    <span class="score" id="score-display">✅ 0 / 26</span>
                </div>
                
                <div class="flash-card">
                    <div class="card-image" id="card-image">
                        <div class="image-placeholder" id="image-placeholder">🖼️</div>
                    </div>
                    <div class="card-content">
                        <div class="word-container">
                            <div class="word-letters" id="word-letters"></div>
                        </div>
                        
                        <div class="letters-container">
                            <div class="letters-title">📌 Перемешанные буквы:</div>
                            <div class="letters-grid" id="letters-grid"></div>
                        </div>
                        
                        <button class="check-btn" id="check-btn">✅ Проверить слово</button>
                        
                        <div class="hint-area" id="hint-area">
                            💡 Нужна подсказка? Нажми сюда
                            <div class="next-hint" id="next-hint"></div>
                        </div>
                        
                        <div class="feedback" id="feedback"></div>
                    </div>
                </div>
                
                <div class="navigation">
                    <button class="nav-btn" id="prev-btn" disabled>◀ Назад</button>
                    <button class="nav-btn primary" id="next-btn">Вперёд ▶</button>
                </div>
                
                <button class="nav-btn primary" id="finish-btn" style="margin-top: 12px;">🏆 Завершить и показать результат</button>
            </div>
            
            <div id="results-area" class="results-area">
                <div class="final-score" id="final-score">🎯 0/26</div>
                <div class="results-table" id="results-table"></div>
                <button id="restart-btn" class="restart-btn">🔄 Пройти заново</button>
            </div>
        </div>
    </div>

    <script>
        // СПИСОК СЛОВ ДЛЯ ИГРЫ
        const WORDS = [
            // Parts of the house (части дома)
            { word: "bathroom", hint: "Комната для купания", category: "parts", emoji: "🛁", image: "bathroom" },
            { word: "bedroom", hint: "Комната для сна", category: "parts", emoji: "🛏️", image: "bedroom" },
            { word: "door", hint: "То, через что входят в комнату", category: "parts", emoji: "🚪", image: "door" },
            { word: "floor", hint: "То, по чему ходят", category: "parts", emoji: "🪵", image: "floor" },
            { word: "garage", hint: "Место для машины", category: "parts", emoji: "🚗", image: "garage" },
            { word: "garden", hint: "Место с цветами и деревьями", category: "parts", emoji: "🌻", image: "garden" },
            { word: "kitchen", hint: "Место для приготовления еды", category: "parts", emoji: "🍳", image: "kitchen" },
            { word: "living room", hint: "Комната для отдыха и гостей", category: "parts", emoji: "🛋️", image: "livingroom" },
            { word: "wall", hint: "Вертикальная поверхность в комнате", category: "parts", emoji: "🧱", image: "wall" },
            { word: "window", hint: "Сквозь него смотрят на улицу", category: "parts", emoji: "🪟", image: "window" },
            
            // Inside the house (предметы мебели)
            { word: "armchair", hint: "Мягкое кресло с подлокотниками", category: "furniture", emoji: "🪑", image: "armchair" },
            { word: "bath", hint: "В нём купаются", category: "furniture", emoji: "🛁", image: "bath" },
            { word: "bed", hint: "На нём спят", category: "furniture", emoji: "🛏️", image: "bed" },
            { word: "chair", hint: "На нём сидят", category: "furniture", emoji: "🪑", image: "chair" },
            { word: "desk", hint: "Письменный стол", category: "furniture", emoji: "📚", image: "desk" },
            { word: "fridge", hint: "Хранит продукты холодными", category: "furniture", emoji: "🧊", image: "fridge" },
            { word: "sofa", hint: "Мягкая мебель для сидения", category: "furniture", emoji: "🛋️", image: "sofa" },
            { word: "table", hint: "За ним едят", category: "furniture", emoji: "🍽️", image: "table" },
            { word: "wardrobe", hint: "Шкаф для одежды", category: "furniture", emoji: "👔", image: "wardrobe" },
            
            // Household objects (предметы обихода)
            { word: "carpet", hint: "Мягкое покрытие на полу", category: "objects", emoji: "🔲", image: "carpet" },
            { word: "cushion", hint: "Мягкая подушка для сидения", category: "objects", emoji: "🪶", image: "cushion" },
            { word: "lamp", hint: "Даёт свет", category: "objects", emoji: "💡", image: "lamp" },
            { word: "plant", hint: "Зелёное украшение дома", category: "objects", emoji: "🪴", image: "plant" },
            { word: "poster", hint: "Картина на стене", category: "objects", emoji: "🖼️", image: "poster" },
            { word: "television", hint: "Чёрный ящик с экраном", category: "objects", emoji: "📺", image: "television" }
        ];

        // Состояние игры
        let currentIndex = 0;
        let userAnswers = new Array(WORDS.length).fill(null);
        let currentWordLetters = [];
        let results = [];

        // DOM элементы
        const gameArea = document.getElementById('game-area');
        const resultsArea = document.getElementById('results-area');
        const cardImage = document.getElementById('card-image');
        const imagePlaceholder = document.getElementById('image-placeholder');
        const wordLettersDiv = document.getElementById('word-letters');
        const lettersGrid = document.getElementById('letters-grid');
        const checkBtn = document.getElementById('check-btn');
        const hintArea = document.getElementById('hint-area');
        const nextHint = document.getElementById('next-hint');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const finishBtn = document.getElementById('finish-btn');
        const restartBtn = document.getElementById('restart-btn');
        const cardCounter = document.getElementById('card-counter');
        const scoreDisplay = document.getElementById('score-display');
        const feedback = document.getElementById('feedback');
        const finalScore = document.getElementById('final-score');
        const resultsTable = document.getElementById('results-table');

        // Функция для перемешивания букв
        function shuffleString(str) {
            let arr = str.split('');
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // Функция для отображения изображения
        function displayImage() {
            const word = WORDS[currentIndex];
            const imagePath = `images/house/${word.image}.jpg`;
            
            const img = new Image();
            img.src = imagePath;
            img.alt = word.word;
            img.style.width = '100%';
            img.style.height = 'auto';
            img.style.maxHeight = '280px';
            img.style.objectFit = 'contain';
            
            img.onload = function() {
                cardImage.innerHTML = '';
                cardImage.appendChild(img);
            };
            
            img.onerror = function() {
                this.onerror = function() {
                    cardImage.innerHTML = `<div class="image-placeholder">${word.emoji}</div>`;
                };
                this.src = `images/house/${word.image}.png`;
                this.onerror = function() {
                    cardImage.innerHTML = `<div class="image-placeholder">${word.emoji}</div>`;
                };
            };
        }

        // Инициализация или сброс текущего слова
        function initCurrentWord() {
            const word = WORDS[currentIndex];
            const savedAnswer = userAnswers[currentIndex];
            
            if (savedAnswer) {
                // Если уже есть сохранённый ответ, показываем его
                currentWordLetters = savedAnswer.split('');
            } else {
                // Иначе создаём пустые ячейки
                currentWordLetters = new Array(word.word.length).fill('');
            }
            
            renderWordSlots();
            renderLetters();
        }

        // Отображение ячеек для букв
        function renderWordSlots() {
            const word = WORDS[currentIndex];
            wordLettersDiv.innerHTML = '';
            
            for (let i = 0; i < currentWordLetters.length; i++) {
                const slot = document.createElement('div');
                slot.className = `letter-slot ${currentWordLetters[i] ? 'filled' : 'empty'}`;
                slot.textContent = currentWordLetters[i] || '?';
                slot.dataset.index = i;
                
                slot.addEventListener('click', () => {
                    if (currentWordLetters[i]) {
                        // Удаляем букву из ячейки и возвращаем её в список
                        const removedLetter = currentWordLetters[i];
                        currentWordLetters[i] = '';
                        renderWordSlots();
                        renderLetters();
                        
                        feedback.textContent = `✓ Буква "${removedLetter}" удалена`;
                        feedback.className = 'feedback show correct';
                        setTimeout(() => feedback.classList.remove('show'), 1500);
                    }
                });
                
                wordLettersDiv.appendChild(slot);
            }
        }

        // Отображение перемешанных букв
        function renderLetters() {
            const word = WORDS[currentIndex];
            const usedLetters = currentWordLetters.filter(l => l !== '');
            
            // Все буквы слова
            const allLetters = word.word.split('');
            
            // Оставшиеся буквы (неиспользованные)
            let remainingLetters = [...allLetters];
            usedLetters.forEach(letter => {
                const index = remainingLetters.indexOf(letter);
                if (index !== -1) remainingLetters.splice(index, 1);
            });
            
            // Перемешиваем оставшиеся буквы
            const shuffled = shuffleString(remainingLetters.join(''));
            
            lettersGrid.innerHTML = '';
            
            shuffled.forEach(letter => {
                const letterCard = document.createElement('div');
                letterCard.className = 'letter-card';
                letterCard.textContent = letter.toLowerCase();
                
                letterCard.addEventListener('click', () => {
                    // Находим первую пустую ячейку
                    const emptyIndex = currentWordLetters.findIndex(l => l === '');
                    if (emptyIndex !== -1) {
                        currentWordLetters[emptyIndex] = letter;
                        renderWordSlots();
                        renderLetters();
                    } else {
                        feedback.textContent = '⚠️ Нет свободных ячеек! Нажми на ячейку, чтобы удалить букву';
                        feedback.className = 'feedback show warning';
                        setTimeout(() => feedback.classList.remove('show'), 2000);
                    }
                });
                
                lettersGrid.appendChild(letterCard);
            });
        }

        // Проверка слова
        function checkWord() {
            const word = WORDS[currentIndex];
            const currentWord = currentWordLetters.join('');
            
            if (currentWord.length !== word.word.length) {
                feedback.textContent = `⚠️ Нужно заполнить все ячейки`;
                feedback.className = 'feedback show warning';
                return false;
            }
            
            const isCorrect = currentWord.toLowerCase() === word.word.toLowerCase();
            
            if (isCorrect) {
                // Сохраняем правильный ответ
                userAnswers[currentIndex] = currentWord;
                feedback.textContent = `✅ Правильно! "${word.word}" — это ${word.hint}`;
                feedback.className = 'feedback show correct';
                
                // Обновляем счёт
                updateScore();
                
                // Автоматически переходим к следующему слову через 1.5 секунды
                if (currentIndex < WORDS.length - 1) {
                    setTimeout(() => {
                        currentIndex++;
                        loadWord();
                    }, 1500);
                }
                
                return true;
            } else {
                feedback.textContent = `❌ Неправильно. Попробуй ещё раз!`;
                feedback.className = 'feedback show warning';
                return false;
            }
        }

        // Загрузка слова
        function loadWord() {
            const savedAnswer = userAnswers[currentIndex];
            
            if (savedAnswer) {
                // Если уже было отвечено, показываем готовый ответ
                currentWordLetters = savedAnswer.split('');
            } else {
                // Иначе создаём пустые ячейки
                currentWordLetters = new Array(WORDS[currentIndex].word.length).fill('');
            }
            
            displayImage();
            renderWordSlots();
            renderLetters();
            updateHintDisplay();
            
            cardCounter.textContent = `${currentIndex + 1} / ${WORDS.length}`;
            feedback.classList.remove('show');
        }

        // Обновление подсказки
        function updateHintDisplay() {
            const word = WORDS[currentIndex];
            nextHint.textContent = `Подсказка: ${word.hint}`;
        }

        // Обновление счёта
        function updateScore() {
            const completedCount = userAnswers.filter(a => a !== null).length;
            scoreDisplay.textContent = `✅ ${completedCount} / ${WORDS.length}`;
        }

        // Навигация
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                loadWord();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < WORDS.length - 1) {
                currentIndex++;
                loadWord();
            }
        });

        // Кнопка проверки
        checkBtn.addEventListener('click', checkWord);

        // Подсказка
        hintArea.addEventListener('click', () => {
            const word = WORDS[currentIndex];
            feedback.textContent = `💡 Подсказка: ${word.hint}`;
            feedback.className = 'feedback show correct';
            setTimeout(() => feedback.classList.remove('show'), 3000);
        });

        // Завершение игры
        finishBtn.addEventListener('click', () => {
            // Проверяем, все ли слова решены
            const unanswered = userAnswers.filter(a => a === null).length;
            
            if (unanswered > 0) {
                feedback.textContent = `⚠️ Осталось решить ${unanswered} слов`;
                feedback.className = 'feedback show warning';
                return;
            }
            
            // Собираем результаты
            results = WORDS.map((word, index) => {
                const userAnswer = userAnswers[index];
                const isCorrect = userAnswer.toLowerCase() === word.word.toLowerCase();
                return {
                    word: word.word,
                    userAnswer: userAnswer,
                    isCorrect: isCorrect,
                    hint: word.hint
                };
            });
            
            const correctCount = results.filter(r => r.isCorrect).length;
            
            gameArea.style.display = 'none';
            resultsArea.classList.add('show');
            
            finalScore.textContent = `🎯 ${correctCount}/${WORDS.length}`;
            
            resultsTable.innerHTML = `
                <div style="display: grid; grid-template-columns: 1.5fr 1.5fr 1fr; font-weight: 700; color: #667eea; padding: 12px 0; border-bottom: 2px solid #e5e7eb;">
                    <div>Слово</div>
                    <div>Твой ответ</div>
                    <div>Результат</div>
                </div>
                ${results.map(r => `
                    <div class="result-row ${r.isCorrect ? 'correct' : 'wrong'}" style="display: grid; grid-template-columns: 1.5fr 1.5fr 1fr; padding: 12px 0; border-bottom: 1px solid #e5e7eb;">
                        <div style="font-weight: 600;">${r.word}</div>
                        <div>${r.userAnswer}</div>
                        <div style="color: ${r.isCorrect ? '#10b981' : '#ef4444'}; font-weight: 600;">${r.isCorrect ? '✓' : '✗'}</div>
                    </div>
                `).join('')}
            `;
        });

        // Перезапуск
        restartBtn.addEventListener('click', () => {
            currentIndex = 0;
            userAnswers = new Array(WORDS.length).fill(null);
            currentWordLetters = [];
            
            gameArea.style.display = 'block';
            resultsArea.classList.remove('show');
            
            loadWord();
            updateScore();
        });

        // Инициализация
        function init() {
            loadWord();
            updateScore();
            cardCounter.textContent = `1 / ${WORDS.length}`;
        }

        init();
    </script>
</body>
</html>
